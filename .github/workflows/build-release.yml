# ============================================================================
# Build & Release — triggers on version tags (v*)
# FUTURE USE: Compiles firmware with XC8, runs all checks, creates Release.
# XC8 compilation is not yet available; this workflow is prepared for when
# the project targets real PIC hardware.
# ============================================================================

name: Build & Release (Future)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  XC8_VERSION: "2.46"
  TARGET_CHIP: "16F15356"
  FIRMWARE_NAME: "helianthus-ebus-adapter"

jobs:
  # First: run all determinism checks
  checks:
    name: Determinism Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run enabled checks
        run: |
          for dir in runtime/src runtime/include bootloader/src bootloader/include; do
            python3 scripts/check_no_recursion.py "$dir"
            python3 scripts/check_no_malloc.py "$dir"
            python3 scripts/check_bounded_loops.py "$dir"
            python3 scripts/check_no_float.py "$dir"
          done
          python3 scripts/check_complexity.py runtime/src --max=15
          python3 scripts/check_complexity.py bootloader/src --max=15

      - name: Build and Test
        run: |
          make build
          make test

  # Second: compile with XC8 (FUTURE — not yet functional)
  build:
    name: Build Firmware (XC8)
    runs-on: ubuntu-latest
    needs: checks
    # NOTE: This job is disabled until XC8 compilation is set up.
    # Remove the 'if: false' when ready to enable XC8 builds.
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Cache XC8 compiler
        id: cache-xc8
        uses: actions/cache@v4
        with:
          path: /opt/microchip/xc8
          key: xc8-${{ env.XC8_VERSION }}-linux

      - name: Install XC8 compiler
        if: steps.cache-xc8.outputs.cache-hit != 'true'
        run: |
          wget -q "https://ww1.microchip.com/downloads/aemDocuments/documents/DEV/ProductDocuments/SoftwareTools/xc8-v${XC8_VERSION}-full-install-linux-x64-installer.run" \
            -O /tmp/xc8-installer.run || {
            echo "::warning::XC8 download failed. Using mock build."
            echo "MOCK_BUILD=true" >> $GITHUB_ENV
            exit 0
          }
          chmod +x /tmp/xc8-installer.run
          sudo /tmp/xc8-installer.run \
            --mode unattended \
            --unattendedmodeui none \
            --netservername "" \
            --LicenseType FreeMode \
            --prefix /opt/microchip/xc8

      - name: Add XC8 to PATH
        if: env.MOCK_BUILD != 'true'
        run: echo "/opt/microchip/xc8/bin" >> $GITHUB_PATH

      - name: Compile firmware
        run: |
          mkdir -p build
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building version: $VERSION"

          if [ "$MOCK_BUILD" = "true" ]; then
            echo "::warning::Mock build - XC8 not available in CI"
            echo "Mock .hex for $VERSION" > build/${{ env.FIRMWARE_NAME }}-${VERSION}.hex
          else
            xc8-cc -mcpu=${{ env.TARGET_CHIP }} \
              -O2 -Wall -std=c99 \
              -DFIRMWARE_VERSION=\"${VERSION}\" \
              -DNDEBUG \
              -Iruntime/include -Ibootloader/include \
              -o build/${{ env.FIRMWARE_NAME }}.hex \
              runtime/src/*.c bootloader/src/*.c

            cp build/${{ env.FIRMWARE_NAME }}.hex \
               build/${{ env.FIRMWARE_NAME }}-${VERSION}.hex
          fi

      - name: Generate build info
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cat > build/BUILD-INFO.txt << EOF
          Firmware: ${{ env.FIRMWARE_NAME }}
          Version:  ${VERSION}
          Target:   PIC${{ env.TARGET_CHIP }}
          Compiler: XC8 v${{ env.XC8_VERSION }}
          Built:    $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Commit:   ${GITHUB_SHA}
          Tag:      ${GITHUB_REF_NAME}

          Determinism checks: ALL PASSED
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/*

  # Third: create GitHub Release (FUTURE — depends on XC8 build)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: release/

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > /tmp/release-notes.md << 'HEADER'
          ## eBUS Adapter Firmware ${{ github.ref_name }}

          ### Build Information
          - **Target:** PIC16F15356
          - **Compiler:** XC8 v${{ env.XC8_VERSION }}
          - **Determinism checks:** All passed

          ### Determinism Guarantees
          - Zero recursion (R1)
          - Zero dynamic allocation (R2)
          - All loops bounded (R3)
          - No floating point (R6)
          - No VLAs (R7)
          - Cyclomatic complexity < 15 (R8)

          HEADER

          if [ -n "$PREV_TAG" ]; then
            echo "### Changes since $PREV_TAG" >> /tmp/release-notes.md
            echo "" >> /tmp/release-notes.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" >> /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
